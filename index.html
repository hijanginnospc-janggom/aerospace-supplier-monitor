<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>항공우주 공급업체 모니터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <p class="eyebrow">Supplier Intelligence</p>
        <h1>항공우주 공급업체 모니터</h1>
        <p class="subtext">업체 뉴스, 시장 지표, 공급망 리스크 신호를 빠르게 확인하는 아침용 정보 화면</p>
      </div>
      <div class="header-actions">
        <div class="refresh-box">
          <span>자동 업데이트</span>
          <strong>1시간마다</strong>
        </div>
        <button id="refreshButton" class="primary-btn">지금 새로고침</button>
      </div>
    </header>

    <section class="top-metrics">
      <div class="metric-strip" id="metricGrid"></div>
    </section>

    <section class="risk-summary panel">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Daily Summary</p>
          <h2>오늘의 리스크 요약</h2>
        </div>
      </div>
      <div class="summary-grid" id="summaryGrid"></div>
    </section>

    <section class="layout">
      <aside class="left-panel">
        <article class="panel">
          <div class="panel-head favorite-head">
            <div>
              <p class="eyebrow">Favorites</p>
              <h2>관심업체</h2>
            </div>
          </div>
          <div class="favorite-list" id="favoriteList"></div>
        </article>

        <article class="panel">
          <div class="panel-head domestic-head">
            <div>
              <p class="eyebrow">Domestic Suppliers</p>
              <h2>국내</h2>
            </div>
          </div>
          <div class="search-box">
            <input id="domesticSearch" type="text" placeholder="국내 공급업체 검색" />
          </div>
          <div class="company-list" id="domesticList"></div>
        </article>

        <article class="panel">
          <div class="panel-head global-head">
            <div>
              <p class="eyebrow">Global Suppliers</p>
              <h2>해외</h2>
            </div>
          </div>
          <div class="search-box">
            <input id="globalSearch" type="text" placeholder="해외 공급업체 검색" />
          </div>
          <div class="company-list" id="globalList"></div>
        </article>
      </aside>

      <main class="main-panel">
        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Supplier News</p>
              <h2 id="newsTitle">전체 최신 뉴스</h2>
            </div>
            <div class="news-actions">
              <span id="newsModeBadge" class="mode-badge">전체 뉴스 모드</span>
              <button id="showAllNewsButton" class="secondary-btn">전체 뉴스 보기</button>
              <div class="source-links" id="sourceLinks"></div>
            </div>
          </div>
          <div class="news-list" id="newsList"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Selected Supplier</p>
              <h2 id="companyTitle">공급업체 정보</h2>
            </div>
            <button id="favoriteToggleButton" class="secondary-btn">관심업체 추가</button>
          </div>
          <div id="companyDetail" class="company-detail"></div>
          <div class="memo-box">
            <div class="panel-head compact-head">
              <div>
                <p class="eyebrow">Supplier Memo</p>
                <h2>업체 메모</h2>
              </div>
            </div>
            <textarea id="supplierMemo" placeholder="이 업체에 대한 메모를 적어둘 수 있습니다. 예: 대체 공급사 필요, 최근 납기 이슈, 중요 고객사 연동 등"></textarea>
            <div class="memo-actions">
              <button id="saveMemoButton" class="primary-btn">메모 저장</button>
              <span id="memoStatus" class="memo-status"></span>
            </div>
          </div>
        </article>
      </main>
    </section>
  </div>

  <div id="chartModal" class="modal hidden">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-card">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Trend View</p>
          <h2 id="chartTitle">지표 추이</h2>
        </div>
        <button id="closeModal" class="close-btn">닫기</button>
      </div>
      <div class="chart-wrap">
        <svg id="trendChart" viewBox="0 0 860 320" preserveAspectRatio="none"></svg>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
